name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            target: x86_64-linux
            binary: zindeks
            archive: tar.gz
          - name: linux-aarch64
            target: aarch64-linux
            binary: zindeks
            archive: tar.gz
          - name: macos-x86_64
            target: x86_64-macos
            binary: zindeks
            archive: tar.gz
          - name: macos-aarch64
            target: aarch64-macos
            binary: zindeks
            archive: tar.gz
          - name: windows-x86_64
            target: x86_64-windows
            binary: zindeks.exe
            archive: zip
          - name: windows-aarch64
            target: aarch64-windows
            binary: zindeks.exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Test native build
        if: matrix.name == 'linux-x86_64'
        run: zig build test

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          package="zindeks-${{ matrix.name }}"
          mkdir -p "dist/${package}"
          cp "zig-out/bin/${{ matrix.binary }}" "dist/${package}/"
          cp README.md "dist/${package}/"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd dist && zip -9 -r "${package}.zip" "${package}")
          else
            tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: zindeks-${{ matrix.name }}
          path: dist/zindeks-${{ matrix.name }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum zindeks-* > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* --title "$TAG_NAME" --generate-notes
          fi
